; PlatformIO Project Configuration File
; ESP32-S3-ETH-8DI-8RO (Waveshare) - Ethernet W5500 + AsyncWebServer + OSC

[platformio]
default_envs = esp32s3_eth_8di_8ro

[env:esp32s3_eth_8di_8ro]
platform = espressif32@6.4.0
board = esp32-s3-devkitc-1
framework = arduino

; -------- Upload / Monitor --------
upload_speed = 921600
monitor_speed = 115200
monitor_filters =
  esp32_exception_decoder
  time
  colorize

; -------- Build options --------
build_type = release
extra_scripts = pre:scripts/embed_changelog.py

; ===== Configuration Waveshare ESP32-S3-POE-ETH-8DI-8RO =====
; Module: ESP32-S3-WROOM-1U-N16R8 (16MB Flash + 8MB PSRAM OPI)
; Wiki: http://www.waveshare.com/wiki/ESP32-S3-ETH-8DI-8RO
board_build.mcu = esp32s3
board_build.f_cpu = 240000000L
board_build.f_flash = 80000000L
board_build.flash_mode = dio
board_build.flash_size = 16MB
board_build.psram_type = opi
board_build.psram = enabled
board_build.arduino.memory_type = qio_opi
board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216

; Partition scheme pour 16MB flash
; Utiliser la table de partition par défaut pour 16MB
board_build.partitions = default_16MB.csv

; Active l'USB CDC au boot (ESP32-S3 USB natif)
build_flags =
  -D ARDUINO_USB_CDC_ON_BOOT=1
  -D ARDUINO_USB_MODE=1
  -D CORE_DEBUG_LEVEL=2
  -D BOARD_HAS_PSRAM

  ; --- Projet : options de logs ---
  -D ENABLE_OSC_LOGGING=1
  -D ENABLE_NETWORK_LOGGING=1
  -D ENABLE_RELAY_LOGGING=1
  -D WATCHDOG_ENABLED=1
  -D WATCHDOG_TIMEOUT_MS=10000

  ; --- Réseau / OSC defaults ---
  -D DEFAULT_OSC_PORT=8000
  -D HTTP_PORT=80

; -------- Libraries (versions verrouillées) --------
lib_deps =
  ; Ethernet W5500 support for ESP32
  https://github.com/khoih-prog/Ethernet_Generic.git

  ; JSON pour API + UI
  bblanchon/ArduinoJson@^6.21.5
  
  ; LED WS2812 (RGB)
  adafruit/Adafruit NeoPixel@^1.12.0

; -------- Recommended for stability --------
lib_ldf_mode = chain+
lib_compat_mode = strict
build_unflags =
  -Os

; -------- LittleFS for persistent logs --------
board_build.filesystem = littlefs
